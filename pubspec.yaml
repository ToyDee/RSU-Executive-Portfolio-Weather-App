name: finalassignment
description: "RSU Executive Portfolio & Weather App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  http: ^0.13.6
  # NEW: needed for MD5 password hashing in app_security.dart
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  assets:
    - Assets/Images/RSU_Logo.png
    - Assets/Icons/
    - Assets/Images/1.jpg
    - Assets/Images/2.jpg
    - Assets/Images/3.jpg
    - Assets/Images/4.jpg
    - Assets/Images/5.jpg
    - Assets/Data/employees.json
    - Assets/Icons/cloud.png
    - Assets/Icons/sun.png
    - Assets/Icons/raining.png
    - Assets/Icons/mist.png
    - Assets/Icons/night.png
    - Assets/Icons/high_temperature.png
    - Assets/Icons/low_temperature.png
    - Assets/Icons/humidity.png

  uses-material-design: true